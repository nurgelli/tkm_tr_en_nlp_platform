services:
  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - '8000:8000'
    volumes:
      - ./app/models:/app/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - '8501:8501'
    depends_on:
      - fastapi
    volumes:
      - ./data:/app/data:ro
    environment:
      - API_BASE_URL=http://fastapi:8000
      - DATA_PATH=/app/data/processed/corpus_cleaned.csv
