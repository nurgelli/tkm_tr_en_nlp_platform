services:
  fastapi:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - '8000:8000'
    volumes:
      - ./app/models:/app/app/models
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  streamlit:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    ports:
      - '8501:8501'
    depends_on:
      - fastapi
    volumes:
      - ./data:/app/data:ro
    environment:
      - API_BASE_URL=http://fastapi:8000
      - DATA_PATH=/app/data/processed/corpus_cleaned.csv
